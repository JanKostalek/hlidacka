<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <defs>
    <linearGradient id="metalA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9fa7b0" />
      <stop offset="52%" stop-color="#eceff3" />
      <stop offset="100%" stop-color="#8f98a3" />
    </linearGradient>
    <linearGradient id="metalB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8d959e" />
      <stop offset="52%" stop-color="#d9dde3" />
      <stop offset="100%" stop-color="#7f8792" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" />
    </filter>
  </defs>

  <rect width="360" height="360" fill="#d7dce2" />

  <!-- Vertical strips -->
  <g opacity="0.72">
    <rect x="0" y="0" width="64" height="120" fill="url(#metalA)" />
    <rect x="72" y="120" width="64" height="120" fill="url(#metalA)" />
    <rect x="144" y="0" width="64" height="120" fill="url(#metalA)" />
    <rect x="216" y="120" width="64" height="120" fill="url(#metalA)" />
    <rect x="288" y="0" width="64" height="120" fill="url(#metalA)" />

    <rect x="0" y="240" width="64" height="120" fill="url(#metalA)" />
    <rect x="72" y="0" width="64" height="120" fill="url(#metalA)" />
    <rect x="144" y="240" width="64" height="120" fill="url(#metalA)" />
    <rect x="216" y="0" width="64" height="120" fill="url(#metalA)" />
    <rect x="288" y="240" width="64" height="120" fill="url(#metalA)" />
  </g>

  <!-- Horizontal strips -->
  <g opacity="0.58">
    <rect x="0" y="72" width="120" height="64" fill="url(#metalB)" />
    <rect x="120" y="0" width="120" height="64" fill="url(#metalB)" />
    <rect x="240" y="72" width="120" height="64" fill="url(#metalB)" />

    <rect x="0" y="216" width="120" height="64" fill="url(#metalB)" />
    <rect x="120" y="144" width="120" height="64" fill="url(#metalB)" />
    <rect x="240" y="216" width="120" height="64" fill="url(#metalB)" />
  </g>

  <!-- Soft highlights -->
  <g filter="url(#soft)" opacity="0.28">
    <rect x="0" y="0" width="360" height="2" fill="#ffffff" />
    <rect x="0" y="120" width="360" height="2" fill="#ffffff" />
    <rect x="0" y="240" width="360" height="2" fill="#ffffff" />
    <rect x="0" y="0" width="2" height="360" fill="#ffffff" />
    <rect x="120" y="0" width="2" height="360" fill="#ffffff" />
    <rect x="240" y="0" width="2" height="360" fill="#ffffff" />
  </g>
</svg>
